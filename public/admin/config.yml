cd /Users/adityabhosale/personal-page-astro
cat > public/admin/config.yml << 'EOF'
backend:
  name: github
  branch: main
  repo: adityanbhosale/personal-page
  site_domain: www.adityanb.com
  base_url: https://www.adityanb.com
  auth_endpoint: oauth

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: thoughts
    label: Thoughts
    folder: src/content/thoughts
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Topic, name: topic, widget: string }
      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ss"
        date_format: "MMM D, YYYY"
        time_format: "h:mm A"
        picker_utc: false
      - { label: Body, name: body, widget: markdown }
EOF